name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - name: Deploy build via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete
          path: dist/
          remote_path: /var/www/perfectweb/dist/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Copy package files
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz
          path: package.json pnpm-lock.yaml ecosystem.config.cjs
          remote_path: /var/www/perfectweb/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Install deps and restart
        uses: appleboy/ssh-action@v1
        env:
          CMS_USERNAME: ${{ secrets.CMS_USERNAME }}
          CMS_PASSWORD: ${{ secrets.CMS_PASSWORD }}
          CMS_SESSION_SECRET: ${{ secrets.CMS_SESSION_SECRET }}
          CMS_ALLOW_TOKEN_LOGIN: ${{ secrets.CMS_ALLOW_TOKEN_LOGIN }}
          CMS_TOKEN: ${{ secrets.CMS_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: CMS_USERNAME,CMS_PASSWORD,CMS_SESSION_SECRET,CMS_ALLOW_TOKEN_LOGIN,CMS_TOKEN
          script: |
            export PATH=$PATH:/usr/local/bin:/root/.local/share/pnpm
            if [ -z "$CMS_USERNAME" ] || [ -z "$CMS_PASSWORD" ]; then
              echo "CMS_USERNAME and CMS_PASSWORD secrets are required"
              exit 1
            fi
            cd /var/www/perfectweb
            mkdir -p storage/media/assets
            umask 077
            {
              printf 'CMS_USERNAME=%s\n' "$CMS_USERNAME"
              printf 'CMS_PASSWORD=%s\n' "$CMS_PASSWORD"
              printf 'CMS_SESSION_SECRET=%s\n' "$CMS_SESSION_SECRET"
              printf 'CMS_ALLOW_TOKEN_LOGIN=%s\n' "$CMS_ALLOW_TOKEN_LOGIN"
              printf 'CMS_TOKEN=%s\n' "$CMS_TOKEN"
            } > .env.production
            pnpm install --prod --frozen-lockfile
            pm2 restart perfectweb --update-env || pm2 start ecosystem.config.cjs
            pm2 save
